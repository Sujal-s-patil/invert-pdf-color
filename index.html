    <style>
        /* Custom styles */
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Style for the drag-over state */
        #drop-zone.drag-over {
            border-color: #4f46e5;
            /* indigo-600 */
            background-color: #374151;
            /* gray-700 */
        }

        /* Simple spinner animation */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">PDF Color Inverter</h1>
            <p class="text-lg text-gray-400">Invert colors on all pages without losing quality.</p>
        </header>

        <main>
            <!-- File Drop Zone -->
            <div id="drop-zone"
                class="bg-gray-800 border-4 border-dashed border-gray-600 rounded-lg p-12 text-center cursor-pointer transition-all duration-300 hover:border-gray-500">
                <!-- This input is hidden but triggered by clicking the div -->
                <input type="file" id="file-input" class="hidden" multiple accept="application/pdf">

                <div class="flex flex-col items-center justify-center">
                    <!-- Upload Icon SVG -->
                    <svg class="w-16 h-16 text-gray-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                        viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                    </svg>
                    <p class="text-xl font-medium text-gray-300">Drag & drop PDF files here</p>
                    <p class="text-gray-500">or click to select files</p>
                </div>
            </div>

            <!-- Loading Spinner (Hidden by default) -->
            <div id="loading-spinner" class="hidden flex-col items-center justify-center py-20">
                <div class="spinner w-12 h-12 border-4 border-t-indigo-500 border-gray-700 rounded-full mb-4"></div>
                <p class="text-lg text-gray-400">Processing files, please wait...</p>
            </div>

            <!-- Output File List -->
            <div id="output-list" class="mt-8 space-y-3">
                <!-- Processed files will be dynamically added here -->
                <!-- 
                Example of a processed file item:
                <div class="bg-gray-800 rounded-lg p-4 flex items-center justify-between shadow-md">
                    <p class="text-gray-200 font-medium truncate">example-inverted i.pdf</p>
                    <button class="ml-4 px-4 py-2 bg-indigo-600 text-white rounded-md font-semibold text-sm hover:bg-indigo-500 transition-colors">
                        Download
                    </button>
                </div> 
                -->
            </div>
        </main>
    </div>

    <script>
        // --- 1. Get necessary libraries from window ---
        // These are loaded from the CDN scripts in the <head>
        const { PDFDocument, rgb, BlendMode } = PDFLib;

        // --- 2. Get DOM Elements ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loadingSpinner = document.getElementById('loading-spinner');
        const outputList = document.getElementById('output-list');

        // --- 3. Main File Handling Logic ---

        /**
         * Toggles the visibility of the loading spinner and the drop zone.
         * @param {boolean} isLoading - True to show spinner, false to show drop zone.
         */
        function showLoading(isLoading) {
            if (isLoading) {
                loadingSpinner.classList.remove('hidden');
                loadingSpinner.classList.add('flex');
                dropZone.classList.add('hidden');
            } else {
                loadingSpinner.classList.add('hidden');
                loadingSpinner.classList.remove('flex');
                dropZone.classList.remove('hidden');
            }
        }

        /**
         * Processes a list of File objects.
         * @param {FileList} files - The list of files from the input or drag/drop.
         */
        async function handleFiles(files) {
            showLoading(true);
            outputList.innerHTML = ''; // Clear previous results
            const processingTasks = [];

            for (const file of files) {
                if (file.type === 'application/pdf') {
                    // Start each PDF inversion as a separate async task
                    processingTasks.push(invertPdf(file));
                } else {
                    console.warn(`Skipping non-PDF file: ${file.name}`);
                }
            }

            // Wait for all PDF inversion tasks to complete
            const results = await Promise.all(processingTasks);

            showLoading(false);

            // Add completed files to the output list
            for (const result of results) {
                if (result) {
                    addFileToOutputList(result.name, result.bytes);
                }
            }
        }

        /**
         * Inverts the colors of a single PDF file.
         * @param {File} file - The PDF file to process.
         * @returns {Promise<{name: string, bytes: Uint8Array} | null>}
         */
        async function invertPdf(file) {
            try {
                // Generate the new inverted filename
                const originalName = file.name.replace(/\.pdf$/i, '');
                const newName = `${originalName} i.pdf`;

                // Load the file into an ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();

                // Load the original PDF
                const pdfDoc = await PDFDocument.load(arrayBuffer);

                // Create a new PDF document to hold the modified pages
                const newPdfDoc = await PDFDocument.create();

                // Get all pages from the original document
                const pages = pdfDoc.getPages();

                // Embed all pages from the original doc into the new one
                // We must embed them into the doc we are saving
                const embeddedPages = await newPdfDoc.embedPages(pages);

                // Loop over each page, create a new page, and apply the 3 layers
                for (let i = 0; i < pages.length; i++) {
                    const originalPage = pages[i];
                    const embeddedPage = embeddedPages[i];
                    const { width, height } = originalPage.getSize();

                    // Add a new page to the new document
                    const newPage = newPdfDoc.addPage([width, height]);

                    // 1. Draw a solid white rectangle as the base (background)
                    // This fixes the transparent background issue.
                    newPage.drawRectangle({
                        x: 0,
                        y: 0,
                        width: width,
                        height: height,
                        color: rgb(1, 1, 1),
                        // Default blend mode is Normal
                    });

                    // 2. Draw the original page content on top of the white background
                    newPage.drawPage(embeddedPage, {
                        x: 0,
                        y: 0,
                        width: width,
                        height: height,
                        // Default blend mode is Normal
                    });

                    // 3. Draw a white rectangle over everything with "Difference" blend mode
                    // This inverts all colors underneath it.
                    newPage.drawRectangle({
                        x: 0,
                        y: 0,
                        width: width,
                        height: height,
                        color: rgb(1, 1, 1), // White
                        blendMode: BlendMode.Difference,
                    });
                }

                // Save the modified PDF (the new one) into a new Uint8Array
                const pdfBytes = await newPdfDoc.save();

                return { name: newName, bytes: pdfBytes };

            } catch (err) {
                console.error(`Failed to process ${file.name}:`, err);
                return null;
            }
        }

        /**
         * Adds a downloadable file item to the UI.
         * @param {string} name - The filename (e.g., "report-inverted.pdf").
         * @param {Uint8Array} bytes - The file content as a byte array.
         */
        function addFileToOutputList(name, bytes) {
            // Create the list item container
            const itemDiv = document.createElement('div');
            itemDiv.className = 'bg-gray-800 rounded-lg p-4 flex items-center justify-between shadow-md transition-all animate-fade-in';

            // Create the filename text
            const text = document.createElement('p');
            text.className = 'text-gray-200 font-medium truncate mr-4';
            text.textContent = name;
            text.title = name; // Show full name on hover

            // Create the download button
            const button = document.createElement('button');
            button.className = 'flex-shrink-0 ml-4 px-4 py-2 bg-indigo-600 text-white rounded-md font-semibold text-sm hover:bg-indigo-500 transition-colors';
            button.textContent = 'Download';

            // Set the download action
            button.onclick = () => {
                // Use download.js to trigger the save dialog
                download(bytes, name, 'application/pdf');
            };

            // Assemble and append
            itemDiv.appendChild(text);
            itemDiv.appendChild(button);
            outputList.appendChild(itemDiv);
        }

        // --- 4. Event Listeners ---

        // Click-to-select files
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // File selection via the hidden input
        fileInput.addEventListener('change', (e) => {
            if (e.target.files) {
                handleFiles(e.target.files);
            }
        });

        // --- Drag and Drop Event Handlers ---

        // Prevent default browser behavior for drag/drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.addEventListener(eventName, (e) => e.preventDefault());
            dropZone.addEventListener(eventName, (e) => e.preventDefault());
        });

        // Add visual feedback on drag over
        dropZone.addEventListener('dragover', () => {
            dropZone.classList.add('drag-over');
        });

        // Remove visual feedback on drag leave
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        // Handle the file drop
        dropZone.addEventListener('drop', (e) => {
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files) {
                handleFiles(e.dataTransfer.files);
            }
        });

    </script>
</body>

</html>
